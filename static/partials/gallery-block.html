<div class="gallery-item-two col-lg-4 col-md-6 col-sm-12">
    <div class="image-box">
        <figure class="image">
            <img src="{image}" alt="{title}" style="width:100%; height:280px; object-fit:cover;">
        </figure>
        <div class="overlay-box">
            <a href="{image}" class="lightbox-image" data-fancybox="gallery" data-caption="{title}">
                <span class="icon flaticon-cross-1"></span>
            </a>
        </div>
    </div>
</div>
