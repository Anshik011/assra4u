<div class="event-block-three col-lg-4 col-md-6 col-sm-12">
    <div class="inner-box wow fadeInUp">
        <div class="image-box">
            <figure class="image">
                <a href="{link}"><img src="{image}" alt="{title}" style="height: 260px; object-fit: cover;"></a>
            </figure>
            
            <div class="date">{day} <span class="month">{month}</span></div>
            
        </div>
        <div class="lower-content">
            <h3><a href="{link}">{title}</a></h3>
            
            <div class="text" style="margin-bottom: 15px;">
                {text}
            </div>
            
            <div class="link-box"><a href="{link}" class="theme-btn btn-style-two"><span class="btn-title">Read More</span></a></div>
        </div>
    </div>
</div>
