{{template_header}}

<section style="padding:80px;max-width:600px;margin:auto;">
  <h1>Contact Us</h1>

  <form method="post" action="{{form_action}}">
    <input type="hidden" name="action" value="utw_form">
    <input type="hidden" name="_utw_nonce" value="{{form_nonce}}">

    <div style="margin-bottom:15px;">
      <input type="text" name="name" placeholder="Your Name" required style="width:100%;padding:10px;">
    </div>

    <div style="margin-bottom:15px;">
      <input type="email" name="email" placeholder="Your Email" required style="width:100%;padding:10px;">
    </div>

    <div style="margin-bottom:15px;">
      <textarea name="message" placeholder="Message" rows="5" style="width:100%;padding:10px;"></textarea>
    </div>

    <button type="submit" style="padding:12px 30px;">
      Send Message
    </button>
  </form>
</section>

{{template_footer}}
