<section class="page-banner">
    <div class="image-layer" style="background-image:url(images/background/bg-banner-1.jpg);"></div>
    <div class="bottom-rotten-curve"></div>
    <div class="auto-container">
        <h1>Top Donors & Partners</h1>
        <ul class="bread-crumb clearfix">
            <li><a href="/">Home</a></li>
            <li class="active">Partners</li>
        </ul>
    </div>
</section>

<section class="clients-section" style="padding: 60px 0;">
    <div class="auto-container">
        <div class="sec-title">
            <div class="text" style="margin-bottom: 40px; font-size: 18px; color: #555;">
                While fulfilling our major aims, we got many supporters; they support our work through donating for the good cause.
            </div>
        </div>

        <div class="row clearfix" style="column-count: 2; column-gap: 50px; display: block;">
            [universal_loop type="partner" count="-1"]
            <div class="donor-item" style="display: inline-block; width: 100%; margin-bottom: 15px; font-size: 17px; color: #333; position: relative; padding-left: 30px; border-bottom: 1px dotted #eee; padding-bottom: 10px;">
                <span style="position: absolute; left: 0; color: #ff6600; font-size: 24px; line-height: 1;">•</span> 
                <strong>{title}</strong>
            </div>
            [/universal_loop]
        </div>
    </div>
</section>

<section class="call-to-action-two">
    <div class="auto-container">
        <div class="inner clearfix">
            <div class="title-box"><h2>Become A Volunteer</h2></div>
            <div class="link-box"><a href="/contact" class="theme-btn btn-style-five"><span class="btn-title">Get Involved</span></a></div>
        </div>
    </div>
</section>
