<section class="page-banner">
    <div class="image-layer" style="background-image:url(images/background/bg-banner-1.jpg);"></div>
    <div class="bottom-rotten-curve"></div>
    <div class="auto-container">
        <h1>Media Coverage</h1>
        <ul class="bread-crumb clearfix">
            <li><a href="/">Home</a></li>
            <li class="active">In The News</li>
        </ul>
    </div>
</section>

<section class="gallery-page-section">
    <div class="auto-container">
        <div class="row clearfix">
            [universal_loop type="media_clip" count="12" pagination="true"]
            <div class="gallery-item col-lg-4 col-md-6 col-sm-12">
                <div class="inner-box">
                    <figure class="image-box" style="background: #e9ecef; min-height: 250px;">
                        <img src="{image}" alt="{title}" onerror="this.onerror=null; this.src='images/resource/no-image.webp';" style="width: 100%; height: 250px; object-fit: cover;">
                        <div class="overlay-box"><a href="{image}" class="lightbox-image" data-fancybox="gallery"><span class="fa fa-search"></span></a></div>
                    </figure>
                    <div class="lower-content" style="padding: 15px; text-align: center; background: #f9f9f9;">
                        <h4>{title}</h4>
                    </div>
                </div>
            </div>
            [/universal_loop]
        </div>
    </div>
</section>

<section class="call-to-action-two">
    <div class="auto-container">
        <div class="inner clearfix">
            <div class="title-box"><h2>Become A Volunteer</h2></div>
            <div class="link-box"><a href="/contact" class="theme-btn btn-style-five"><span class="btn-title">Get Involved</span></a></div>
        </div>
    </div>
</section>
