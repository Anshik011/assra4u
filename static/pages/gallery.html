<section class="page-banner">
    <div class="image-layer" style="background-image:url(images/background/bg-banner-1.jpg);"></div>
    <div class="bottom-rotten-curve"></div>
    <div class="auto-container">
        <h1>Our Portfolio</h1>
        <ul class="bread-crumb clearfix">
            <li><a href="/">Home</a></li>
            <li class="active">Our Portfolio</li>
        </ul>
    </div>
</section>

<section class="gallery-page-section">
    <div class="auto-container">
        
        <div class="mixitup-gallery">
            <div class="filters clearfix">
                <ul class="filter-tabs filter-btns clearfix">
                    <li class="active filter" data-role="button" data-filter="all">All</li>
                    <li class="filter" data-role="button" data-filter=".children">Children</li>
                    <li class="filter" data-role="button" data-filter=".volunteer">Volunteer</li>
                    <li class="filter" data-role="button" data-filter=".animals">Animals</li>
                    <li class="filter" data-role="button" data-filter=".donate">Donate</li>
                </ul>
            </div>

            <div class="filter-list row">
                [universal_loop type="gallery" template="gallery-block.html"]
            </div>
        </div>
        
    </div>
</section>

<section class="call-to-action-two">
    <div class="auto-container">
        <div class="inner clearfix">
            <div class="title-box"><h2>Become A Volunteer</h2></div>
            <div class="link-box"><a href="/contact" class="theme-btn btn-style-five"><span class="btn-title">Get Involved</span></a></div>
        </div>
    </div>
</section>
