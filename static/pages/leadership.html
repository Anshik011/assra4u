<section class="page-banner">
    <div class="image-layer" style="background-image:url(images/background/bg-banner-1.jpg);"></div>
    <div class="bottom-rotten-curve"></div>
    <div class="auto-container">
        <h1>Our Leadership</h1>
        <ul class="bread-crumb clearfix">
            <li><a href="/">Home</a></li>
            <li class="active">Board Members</li>
        </ul>
    </div>
</section>

<section class="team-section">
    <div class="auto-container">
        <div class="row clearfix">
            [universal_loop type="board_member" count="12"]
            <div class="team-block col-lg-3 col-md-6 col-sm-12">
                <div class="inner-box">
                    <div class="image-box" style="background: #f4f6f8; min-height: 300px;">
                        <img src="{image}" alt="{title}" onerror="this.onerror=null; this.src='images/resource/no-image.webp';" style="width: 100%; height: 300px; object-fit: cover;">
                    </div>
                    <div class="lower-content" style="text-align: center; padding-top: 20px;">
                        <h3>{title}</h3>
                        <div class="designation" style="color: #ff5e14; font-size: 14px;">{text}</div>
                    </div>
                </div>
            </div>
            [/universal_loop]
        </div>
    </div>
</section>

<section class="call-to-action-two">
    <div class="auto-container">
        <div class="inner clearfix">
            <div class="title-box"><h2>Become A Volunteer</h2></div>
            <div class="link-box"><a href="/contact" class="theme-btn btn-style-five"><span class="btn-title">Get Involved</span></a></div>
        </div>
    </div>
</section>
